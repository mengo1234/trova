services:
  tika:
    image: docker.io/hamza5/tika:latest-full
    container_name: trova-tika
    ports:
      - "127.0.0.1:9998:9998"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  typesense:
    image: docker.io/typesense/typesense:29.0
    container_name: trova-typesense
    ports:
      - "127.0.0.1:8108:8108"
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-trova-typesense-key}
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_SNAPSHOT_INTERVAL_SECONDS: 900
    volumes:
      - trova-typesense-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  trova-typesense-data:
