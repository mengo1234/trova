<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trova Design Screens</title>
    <style>
      html,
      body {
        margin: 0;
        background: #f4f7fb;
        color: #263238;
        font: 600 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        padding: 18px;
      }

      .sheet {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      figure {
        margin: 0;
        padding: 8px;
        border: 1px solid rgba(70, 80, 90, 0.14);
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(45, 55, 72, 0.12);
      }

      img {
        display: block;
        width: 100%;
        height: 168px;
        object-fit: cover;
        object-position: top;
        border-radius: 10px;
        background: #eef2f7;
      }

      figcaption {
        overflow: hidden;
        padding: 7px 2px 1px;
        color: #506070;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <figure><img src="screenshots/01-tutorial-index.png" alt="" /><figcaption>01 tutorial index</figcaption></figure>
      <figure><img src="screenshots/02-tutorial-models.png" alt="" /><figcaption>02 tutorial models</figcaption></figure>
      <figure><img src="screenshots/03-tutorial-preview.png" alt="" /><figcaption>03 tutorial preview</figcaption></figure>
      <figure><img src="screenshots/04-tutorial-privacy.png" alt="" /><figcaption>04 tutorial privacy</figcaption></figure>
      <figure><img src="screenshots/05-home-empty.png" alt="" /><figcaption>05 home empty</figcaption></figure>
      <figure><img src="screenshots/06-settings-overview.png" alt="" /><figcaption>06 settings overview</figcaption></figure>
      <figure><img src="screenshots/07-settings-folders.png" alt="" /><figcaption>07 settings folders</figcaption></figure>
      <figure><img src="screenshots/08-settings-prep.png" alt="" /><figcaption>08 settings prep</figcaption></figure>
      <figure><img src="screenshots/09-settings-doctor.png" alt="" /><figcaption>09 settings doctor</figcaption></figure>
      <figure><img src="screenshots/10-settings-vision.png" alt="" /><figcaption>10 settings vision</figcaption></figure>
      <figure><img src="screenshots/11-settings-remote.png" alt="" /><figcaption>11 settings remote</figcaption></figure>
      <figure><img src="screenshots/12-settings-access.png" alt="" /><figcaption>12 settings access</figcaption></figure>
      <figure><img src="screenshots/13-settings-cloud.png" alt="" /><figcaption>13 settings cloud</figcaption></figure>
      <figure><img src="screenshots/14-settings-advanced.png" alt="" /><figcaption>14 settings advanced</figcaption></figure>
    </main>
  </body>
</html>
